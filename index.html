<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo House Arcade</title>
    <style>
        :root { 
            --bg: #1a1a2e; 
            --panel: #16213e; 
            --accent: #4cc9f0; 
            --score-color: #4df0a2;
            --danger: #ff4d6d; 
        }
        * { box-sizing: border-box; user-select: none; touch-action: manipulation; }
        
        body { 
            margin: 0; background: var(--bg); color: white;
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
        }

        #game-container {
            display: flex; flex-direction: column; height: 100vh; max-width: 450px; margin: 0 auto;
            border-left: 4px solid #333; border-right: 4px solid #333;
        }

        /* Top Bar */
        #hud {
            padding: 20px; display: grid; grid-template-columns: 1fr 1fr;
            background: var(--panel); border-bottom: 4px solid var(--accent);
        }
        .stat-label { font-size: 0.8rem; color: var(--accent); display: block; }
        .stat-value { font-size: 1.8rem; font-weight: bold; }

        /* Game Area */
        #stage {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 20px; gap: 30px;
        }

        #display-emoji { 
            font-size: 7rem; text-shadow: 0 0 20px rgba(76, 201, 240, 0.5);
            transition: transform 0.1s;
        }

        .button-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%;
        }

        .choice-btn {
            padding: 20px 10px; font-family: inherit; font-weight: bold;
            background: transparent; color: white; border: 2px solid var(--accent);
            border-radius: 8px; cursor: pointer; transition: 0.1s;
        }

        .choice-btn:active { background: var(--accent); color: var(--bg); }

        /* Overlays */
        .overlay {
            position: fixed; inset: 0; background: rgba(26, 26, 46, 0.95);
            z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        .big-btn {
            background: var(--accent); border: none; padding: 20px 50px;
            font-family: inherit; font-size: 1.5rem; font-weight: bold;
            margin-top: 20px; border-radius: 50px; cursor: pointer;
        }

        /* Animations */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
        .error { animation: shake 0.3s; color: var(--danger); }
        .bounce { animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div>
            <span class="stat-label">SCORE</span>
            <span id="score" class="stat-value">0</span>
        </div>
        <div style="text-align: right;">
            <span class="stat-label">TIME</span>
            <span id="timer" class="stat-value">30</span>
        </div>
    </div>

    <div id="stage">
        <div id="display-emoji" class="bounce">🏠</div>
        <div class="button-grid" id="choices"></div>
    </div>
</div>

<div id="start-screen" class="overlay">
    <h1 style="font-size: 3rem; color: var(--accent);">SOLO<br>ARCADE</h1>
    <p id="attempt-text">Ready Player One</p>
    <button class="big-btn" onclick="startGame()">INSERT COIN</button>
</div>

<div id="end-screen" class="overlay" style="display:none">
    <h1 id="end-title">GAME OVER</h1>
    <div style="margin: 20px 0;">
        <p>FINAL SCORE: <span id="final-score" style="color:var(--score-color); font-size: 2rem;">0</span></p>
        <p>BEST: <span id="best-score">0</span></p>
    </div>
    <button id="retry-btn" class="big-btn" onclick="location.reload()">TRY AGAIN</button>
</div>

<script>
    const gameData = [
        { name: 'KITCHEN', icon: '🍳', pool: ['KITCHEN', 'BEDROOM', 'GARDEN', 'PANTRY'] },
        { name: 'BEDROOM', icon: '🛏️', pool: ['BEDROOM', 'ATTIC', 'HALLWAY', 'KITCHEN'] },
        { name: 'BATHROOM', icon: '🛁', pool: ['BATHROOM', 'LIVING ROOM', 'GARAGE', 'LAUNDRY'] },
        { name: 'LIVING ROOM', icon: '🛋️', pool: ['LIVING ROOM', 'DINING ROOM', 'STUDY', 'BEDROOM'] },
        { name: 'GARAGE', icon: '🚗', pool: ['GARAGE', 'DRIVEWAY', 'GARDEN', 'BASEMENT'] },
        { name: 'GARDEN', icon: '🌻', pool: ['GARDEN', 'BALCONY', 'YARD', 'KITCHEN'] }
    ];

    let score = 0;
    let timeLeft = 30;
    let gameActive = false;
    let isPenalty = false;
    let timerInterval;

    // Persist data
    let plays = parseInt(localStorage.getItem('solo_plays') || 0);
    let highScore = parseInt(localStorage.getItem('solo_best') || 0);

    window.onload = () => {
        if (plays >= 2) {
            document.querySelector('.big-btn').style.display = 'none';
            document.getElementById('attempt-text').innerHTML = "CREDITS EXHAUSTED<br>Best: " + highScore;
        } else {
            document.getElementById('attempt-text').innerText = `ATTEMPT ${plays + 1} / 2`;
        }
    };

    function startGame() {
        plays++;
        localStorage.setItem('solo_plays', plays);
        document.getElementById('start-screen').style.display = 'none';
        gameActive = true;
        nextRound();
        
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    function nextRound() {
        if (!gameActive || isPenalty) return;

        const item = gameData[Math.floor(Math.random() * gameData.length)];
        const display = document.getElementById('display-emoji');
        const choiceContainer = document.getElementById('choices');

        display.innerText = item.icon;
        display.classList.remove('error');
        choiceContainer.innerHTML = '';

        // Shuffle choices
        [...item.pool].sort(() => Math.random() - 0.5).forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = choice;
            btn.onclick = () => handleInput(choice, item.name);
            choiceContainer.appendChild(btn);
        });
    }

    function handleInput(selected, correct) {
        if (isPenalty) return;

        if (selected === correct) {
            score += 10;
            // Time bonus for correct answer
            timeLeft += 1; 
            document.getElementById('score').innerText = score;
            nextRound();
        } else {
            isPenalty = true;
            document.getElementById('display-emoji').classList.add('error');
            // Penalty: lose 2 seconds
            timeLeft = Math.max(0, timeLeft - 2); 
            setTimeout(() => {
                isPenalty = false;
                nextRound();
            }, 600);
        }
    }

    function endGame() {
        clearInterval(timerInterval);
        gameActive = false;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('solo_best', highScore);
            document.getElementById('end-title').innerText = "NEW RECORD!";
        }
        
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
        document.getElementById('best-score').innerText = highScore;

        if (plays >= 2) {
            const btn = document.getElementById('retry-btn');
            btn.innerText = "OUT OF CREDITS";
            btn.style.opacity = "0.5";
            btn.onclick = null;
        }
    }
</script>

</body>
</html>
