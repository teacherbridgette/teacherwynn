<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parts of the House: Arcade Battle</title>
    <style>
        :root { 
            --mario-red: #e74c3c; --luigi-green: #2ecc71; 
            --brick: #ab4642; --sky: #5c94fc; --coin: #f1c40f; 
        }
        * { box-sizing: border-box; user-select: none; touch-action: manipulation; }
        
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            font-family: "Comic Sans MS", "Comic Sans", cursive, sans-serif; 
            font-variant: small-caps; 
            background: var(--sky); 
        }
        
        #game-wrapper { display: flex; width: 100%; height: 100%; position: relative; }
        
        #divider { 
            position: absolute; left: 50%; width: 30px; height: 100%; 
            background: linear-gradient(to right, #1e3c1a, #48d048, #1e3c1a); 
            transform: translateX(-50%); z-index: 100; border: 5px solid #000;
        }

        .team-side { flex: 1; height: 100%; display: flex; flex-direction: column; align-items: center; position: relative; transition: 0.3s; }
        #side-red { background: var(--mario-red); }
        #side-green { background: var(--luigi-green); }

        /* Freeze state styling */
        .frozen { filter: grayscale(1) brightness(0.7); pointer-events: none; }
        .freeze-timer { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 8rem; color: white; text-shadow: 4px 4px #000; z-index: 500; display: none;
        }

        .header { height: 15vh; width: 100%; display: flex; justify-content: space-around; align-items: center; color: white; text-shadow: 5px 5px #000; font-size: 4.5rem; z-index: 10; font-weight: bold; }
        
        .play-area { 
            flex: 0.8; width: 94%; background: #fff; border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-around; 
            padding: 20px; border: 12px solid #000; box-shadow: 15px 15px 0 rgba(0,0,0,0.3);
            position: relative;
        }

        .prompt-box { background: #fff; border: 6px solid #000; padding: 15px 30px; border-radius: 10px; box-shadow: 8px 8px 0 #000; }
        .prompt { font-size: 2.2rem; color: #000; margin: 0; font-weight: 900; }
        
        .big-display { font-size: 11rem; margin: 10px; animation: bounce 0.8s infinite alternate; }
        .spelling-text { font-size: 6rem; letter-spacing: 15px; font-weight: 900; color: #333; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; height: 45%; }
        
        .btn-choice { 
            font-size: 2.8rem; border: 6px solid #000; border-radius: 0; 
            background: var(--coin); color: #fff; font-weight: 900; 
            box-shadow: 10px 10px 0 #8a6d00; cursor: pointer;
            text-shadow: 3px 3px #000; font-family: inherit; font-variant: small-caps;
        }
        .btn-choice:active { transform: translate(5px, 5px); box-shadow: 2px 2px 0 #8a6d00; }

        .feedback {
            position: absolute; font-size: 6rem; pointer-events: none;
            animation: floatUp 0.8s ease-out forwards; z-index: 1000;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }

        #timer-blob { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            background: #fff; padding: 10px 60px; font-size: 5rem; 
            z-index: 200; border: 8px solid #000; font-weight: 900; box-shadow: 12px 12px 0 rgba(0,0,0,0.4);
        }

        .overlay { position: absolute; width: 100%; height: 100%; background: #000; z-index: 300; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-25px); } }
        .flash-correct { background: #fff !important; filter: brightness(1.5); }
    </style>
</head>
<body>

<div id="timer-blob">50</div>

<div id="game-wrapper">
    <div id="divider"></div>

    <div id="start-overlay" class="overlay">
        <h1 style="font-size: 6rem; color: var(--coin); margin:0;">PARTS OF THE HOUSE</h1>
        <p style="font-size: 3rem; margin: 20px 0;">Battle Start!</p>
        <button class="btn-choice" style="width: auto; padding: 30px 100px; font-size: 4rem;" onclick="startGame()">PRESS START</button>
    </div>

    <div id="win-overlay" class="overlay" style="display:none;">
        <h1 style="font-size: 8rem; color: var(--coin);">GAME OVER</h1>
        <h2 id="win-msg" style="font-size: 4rem; margin: 20px 0;"></h2>
        <div id="final-stats" style="font-size: 3rem; border: 8px dashed #fff; padding: 30px;"></div>
        <button class="btn-choice" style="width: auto; padding: 20px 60px; font-size: 3rem; margin-top: 40px;" onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <div class="team-side" id="side-red">
        <div id="freeze-red" class="freeze-timer">WAIT!</div>
        <div class="header"><span>MARIO</span><span id="score-red">0</span></div>
        <div class="play-area" id="area-red">
            <div class="prompt-box"><p id="red-prompt" class="prompt">WHERE IS THIS?</p></div>
            <div id="red-display" class="big-display">🏠</div>
            <div class="options-grid" id="red-options"></div>
        </div>
    </div>

    <div class="team-side" id="side-green">
        <div id="freeze-green" class="freeze-timer">WAIT!</div>
        <div class="header"><span>LUIGI</span><span id="score-green">0</span></div>
        <div class="play-area" id="area-green">
            <div class="prompt-box"><p id="green-prompt" class="prompt">WHERE IS THIS?</p></div>
            <div id="green-display" class="big-display">🏠</div>
            <div class="options-grid" id="green-options"></div>
        </div>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let bgmInterval;

    function playNote(f, d, type='square', v=0.1) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    const sfx = {
        coin: () => { playNote(987, 0.1); setTimeout(()=>playNote(1318, 0.4), 80); },
        stomp: () => { playNote(150, 0.2, 'sawtooth', 0.2); playNote(110, 0.4, 'triangle', 0.3); },
        gameOver: () => { [392, 329, 261, 196, 164, 130].forEach((n, i) => setTimeout(() => playNote(n, 0.6, 'square', 0.15), i * 150)); }
    };

    function startBGM() {
        const loop = [261, 329, 392, 523, 0, 392, 0, 0];
        let step = 0;
        bgmInterval = setInterval(() => {
            if(loop[step%8] > 0) playNote(loop[step%8], 0.15, 'triangle', 0.04);
            step++;
        }, 200);
    }

    const houseData = [
        { name: 'KITCHEN', icon: '🍳', rooms: ['KITCHEN', 'BEDROOM', 'BATHROOM', 'LIVING ROOM'] },
        { name: 'BEDROOM', icon: '🛏️', rooms: ['BEDROOM', 'KITCHEN', 'DINING ROOM', 'BATHROOM'] },
        { name: 'BATHROOM', icon: '🛁', rooms: ['BATHROOM', 'LIVING ROOM', 'KITCHEN', 'BEDROOM'] },
        { name: 'DINING ROOM', icon: '🍽️', rooms: ['DINING ROOM', 'KITCHEN', 'BATHROOM', 'LIVING ROOM'] },
        { name: 'LIVING ROOM', icon: '🛋️', rooms: ['LIVING ROOM', 'BEDROOM', 'BATHROOM', 'KITCHEN'] }
    ];

    let scores = { red: 0, green: 0 };
    let frozen = { red: false, green: false };
    let timeLeft = 50; 
    let active = false;

    function startGame() {
        audioCtx.resume(); startBGM();
        document.getElementById('start-overlay').style.display = 'none';
        active = true;
        update('red'); update('green');
        const clock = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-blob').innerText = timeLeft;
            if(timeLeft <= 0) { clearInterval(clock); clearInterval(bgmInterval); sfx.gameOver(); finish(); }
        }, 1000);
    }

    function spawnFeedback(team, isCorrect, x, y) {
        const div = document.createElement('div');
        div.className = 'feedback';
        div.innerText = isCorrect ? '💰' : '🍄'; 
        div.style.left = (x - 50) + 'px';
        div.style.top = (y - 50) + 'px';
        document.getElementById(`area-${team}`).appendChild(div);
        setTimeout(() => div.remove(), 800);
    }

    function update(team) {
        if(!active || frozen[team]) return;
        const item = houseData[Math.floor(Math.random() * houseData.length)];
        const isSpelling = timeLeft < 25; 
        
        const display = document.getElementById(`${team}-display`);
        const prompt = document.getElementById(`${team}-prompt`);
        const options = document.getElementById(`${team}-options`);
        options.innerHTML = '';

        if(!isSpelling) {
            prompt.innerText = "WHERE IS THIS?";
            display.innerText = item.icon;
            display.className = "big-display";
            let pool = [...item.rooms].sort(() => Math.random() - 0.5);
            pool.forEach(r => createBtn(team, r, item.name, options));
        } else {
            prompt.innerText = "FINISH THE WORD!";
            let word = item.name;
            let idx = Math.floor(Math.random() * word.length);
            if(word[idx] === ' ') idx--;
            let correct = word[idx];
            let hidden = word.split(''); hidden[idx] = '_';
            display.innerText = hidden.join('');
            display.className = "big-display spelling-text";
            
            let pool = [correct];
            while(pool.length < 4) {
                let r = String.fromCharCode(65 + Math.floor(Math.random()*26));
                if(!pool.includes(r)) pool.push(r);
            }
            pool.sort(() => Math.random() - 0.5).forEach(l => createBtn(team, l, correct, options));
        }
    }

    function createBtn(team, text, correct, parent) {
        const b = document.createElement('button');
        b.className = 'btn-choice';
        b.innerText = text;
        b.onmousedown = (e) => {
            if(frozen[team]) return;
            const rect = parent.parentElement.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if(text === correct) {
                scores[team]++;
                document.getElementById(`score-${team}`).innerText = scores[team];
                sfx.coin();
                spawnFeedback(team, true, x, y);
                document.getElementById(`side-${team}`).classList.add('flash-correct');
                setTimeout(() => { 
                    document.getElementById(`side-${team}`).classList.remove('flash-correct'); 
                    update(team); 
                }, 150);
            } else {
                // PENALTY FREEZE LOGIC
                frozen[team] = true;
                sfx.stomp();
                spawnFeedback(team, false, x, y);
                const side = document.getElementById(`side-${team}`);
                const waitMsg = document.getElementById(`freeze-${team}`);
                
                side.classList.add('frozen');
                waitMsg.style.display = 'block';
                
                setTimeout(() => {
                    frozen[team] = false;
                    side.classList.remove('frozen');
                    waitMsg.style.display = 'none';
                    update(team); // Refresh question after freeze
                }, 3000);
            }
        };
        parent.appendChild(b);
    }

    function finish() {
        active = false;
        document.getElementById('win-overlay').style.display = 'flex';
        document.getElementById('final-stats').innerText = `MARIO: ${scores.red} | LUIGI: ${scores.green}`;
        const msg = document.getElementById('win-msg');
        if(scores.red > scores.green) msg.innerText = "MARIO WINS!";
        else if(scores.green > scores.red) msg.innerText = "LUIGI WINS!";
        else msg.innerText = "IT'S A DRAW!";
    }
</script>
</body>
</html>
