<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>House Quiz Arcade</title>
    <style>
        :root { --main-bg: #5c94fc; --card-bg: #ffffff; --accent: #f1c40f; --danger: #e74c3c; }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--main-bg); overflow: hidden;
        }

        /* Single Player Layout */
        #game-container {
            display: flex; flex-direction: column;
            width: 100%; height: 100%; max-width: 500px; margin: 0 auto;
        }

        #hud {
            height: 80px; display: flex; justify-content: space-around; align-items: center;
            background: rgba(0,0,0,0.4); color: white; font-size: 1.5rem; font-weight: bold;
        }

        #main-stage {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 20px; gap: 20px;
        }

        .quiz-card {
            width: 100%; background: var(--card-bg); border: 6px solid #000;
            border-radius: 20px; padding: 30px; display: flex; flex-direction: column;
            align-items: center; box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
        }

        #display-emoji { font-size: 6rem; margin: 20px 0; transition: transform 0.2s; }
        .bounce { animation: bounce 0.6s infinite alternate; }

        .button-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%;
        }

        .choice-btn {
            padding: 15px 5px; font-size: 1.1rem; font-weight: bold; border: 4px solid #000;
            background: var(--accent); border-radius: 10px; cursor: pointer;
            box-shadow: 4px 4px 0 #8a6d00; text-transform: uppercase;
        }

        .choice-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0 #000; }

        /* Overlays */
        .screen-overlay {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: white; text-align: center; padding: 30px;
        }

        .lock-notice { color: var(--danger); font-size: 2rem; font-weight: bold; }
        
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }
        .error-shake { filter: grayscale(1); pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <span>POINTS: <span id="score">0</span></span>
        <span>TIME: <span id="timer">45</span></span>
    </div>

    <div id="main-stage">
        <div class="quiz-card" id="card">
            <div id="instruction" style="font-weight:bold; color:#666">Identify the Room:</div>
            <div id="display-emoji" class="bounce">🏠</div>
            <div class="button-grid" id="choices"></div>
        </div>
    </div>
</div>

<div id="start-screen" class="screen-overlay">
    <h1 id="title-text">HOUSE ARCADE</h1>
    <p id="status-text">Loading...</p>
    <button class="choice-btn" id="start-button" style="padding: 20px 60px;" onclick="initGame()">START</button>
</div>

<div id="end-screen" class="screen-overlay" style="display:none">
    <h1 style="color:var(--accent)">FINISH!</h1>
    <div id="result-board" style="font-size: 1.5rem; margin: 20px 0;"></div>
    <button class="choice-btn" id="retry-button" style="padding: 15px 40px;" onclick="location.reload()">TRY AGAIN</button>
</div>

<script>
    const gameData = [
        { name: 'KITCHEN', icon: '🍳', pool: ['KITCHEN', 'BEDROOM', 'GARDEN', 'BATHROOM'] },
        { name: 'BEDROOM', icon: '🛏️', pool: ['BEDROOM', 'KITCHEN', 'ATTIC', 'HALLWAY'] },
        { name: 'BATHROOM', icon: '🛁', pool: ['BATHROOM', 'LIVING ROOM', 'KITCHEN', 'GARAGE'] },
        { name: 'LIVING ROOM', icon: '🛋️', pool: ['LIVING ROOM', 'BEDROOM', 'DINING ROOM', 'KITCHEN'] },
        { name: 'GARAGE', icon: '🚗', pool: ['GARAGE', 'GARDEN', 'KITCHEN', 'LIVING ROOM'] }
    ];

    let currentScore = 0;
    let secondsLeft = 45;
    let isGameRunning = false;
    let penaltyActive = false;

    // LOCAL STORAGE CHECK
    let plays = parseInt(localStorage.getItem('arcade_playcount') || 0);
    let record = parseInt(localStorage.getItem('arcade_highscore') || 0);

    window.onload = () => {
        const btn = document.getElementById('start-button');
        const status = document.getElementById('status-text');
        
        if (plays >= 2) {
            document.getElementById('title-text').innerText = "LIMIT REACHED";
            status.innerHTML = `You have used both attempts.<br>Best Score: <b>${record}</b>`;
            btn.style.display = 'none';
        } else {
            status.innerText = `Attempt ${plays + 1} of 2`;
        }
    };

    function initGame() {
        plays++;
        localStorage.setItem('arcade_playcount', plays);
        document.getElementById('start-screen').style.display = 'none';
        isGameRunning = true;
        nextRound();
        
        const countdown = setInterval(() => {
            secondsLeft--;
            document.getElementById('timer').innerText = secondsLeft;
            if(secondsLeft <= 0) {
                clearInterval(countdown);
                gameOver();
            }
        }, 1000);
    }

    function nextRound() {
        if(!isGameRunning || penaltyActive) return;
        
        const item = gameData[Math.floor(Math.random() * gameData.length)];
        const display = document.getElementById('display-emoji');
        const choiceContainer = document.getElementById('choices');
        
        display.innerText = item.icon;
        choiceContainer.innerHTML = '';

        let shuffled = [...item.pool].sort(() => Math.random() - 0.5);
        shuffled.forEach(choice => {
            const b = document.createElement('button');
            b.className = 'choice-btn';
            b.innerText = choice;
            b.onclick = () => checkAnswer(choice, item.name);
            choiceContainer.appendChild(b);
        });
    }

    function checkAnswer(selected, correct) {
        if(penaltyActive) return;
        
        if(selected === correct) {
            currentScore++;
            document.getElementById('score').innerText = currentScore;
            nextRound();
        } else {
            penaltyActive = true;
            document.getElementById('card').classList.add('error-shake');
            setTimeout(() => {
                penaltyActive = false;
                document.getElementById('card').classList.remove('error-shake');
                nextRound();
            }, 2000);
        }
    }

    function gameOver() {
        isGameRunning = false;
        if(currentScore > record) {
            record = currentScore;
            localStorage.setItem('arcade_highscore', record);
        }
        
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('result-board').innerHTML = `Current Score: ${currentScore}<br>Best Score: ${record}`;
        
        if(plays >= 2) {
            const retry = document.getElementById('retry-button');
            retry.innerText = "LOCKED";
            retry.disabled = true;
            retry.style.opacity = "0.5";
        }
    }
</script>

</body>
</html>
