<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let score = 0, timeLeft = 50, active = false, isFrozen = false;

    // --- LOCK & LIMIT LOGIC ---
    // Check how many times they have played before
    let playCount = localStorage.getItem('houseGame_plays') || 0;
    let highScore = localStorage.getItem('houseGame_score') || 0;

    window.onload = () => {
        const startBtn = document.querySelector('#start-overlay .btn-choice');
        const startTitle = document.querySelector('#start-overlay h1');
        
        if (playCount >= 2) {
            // LOCK THE GAME
            startTitle.innerText = "GAME LOCKED";
            startBtn.style.display = 'none';
            const msg = document.createElement('p');
            msg.innerHTML = `You have used your 2 attempts!<br>Your Best Score: <b>${highScore}</b>`;
            msg.style.fontSize = "1.5rem";
            document.getElementById('start-overlay').appendChild(msg);
        }
    };

    const houseData = [
        { name: 'KITCHEN', icon: '🍳', rooms: ['KITCHEN', 'BEDROOM', 'BATHROOM', 'LIVING ROOM'] },
        { name: 'BEDROOM', icon: '🛏️', rooms: ['BEDROOM', 'KITCHEN', 'DINING ROOM', 'BATHROOM'] },
        { name: 'BATHROOM', icon: '🛁', rooms: ['BATHROOM', 'LIVING ROOM', 'KITCHEN', 'BEDROOM'] },
        { name: 'DINING ROOM', icon: '🍽️', rooms: ['DINING ROOM', 'KITCHEN', 'BATHROOM', 'LIVING ROOM'] },
        { name: 'LIVING ROOM', icon: '🛋️', rooms: ['LIVING ROOM', 'BEDROOM', 'BATHROOM', 'KITCHEN'] }
    ];

    function playNote(f, d) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    function startGame() {
        // Increase play count and save it
        playCount++;
        localStorage.setItem('houseGame_plays', playCount);
        
        audioCtx.resume();
        document.getElementById('start-overlay').style.display = 'none';
        active = true;
        updateQuestion();
        const clock = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-blob').innerText = timeLeft;
            if(timeLeft <= 0) { 
                clearInterval(clock); 
                active = false; 
                finishGame();
            }
        }, 1000);
    }

    function finishGame() {
        // Update High Score only if this current score is better
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('houseGame_score', highScore);
        }

        document.getElementById('win-overlay').style.display = 'flex';
        let remaining = 2 - playCount;
        let attemptText = remaining > 0 ? `Attempts left: ${remaining}` : "No attempts left!";
        
        document.getElementById('final-stats').innerHTML = `
            SCORE: ${score}<br>
            BEST: ${highScore}<br>
            <small>${attemptText}</small>
        `;

        // Hide "Play Again" button if they are out of turns
        if (playCount >= 2) {
            document.querySelector('#win-overlay .btn-choice').innerText = "LOCKED";
            document.querySelector('#win-overlay .btn-choice').disabled = true;
            document.querySelector('#win-overlay .btn-choice').style.opacity = "0.5";
        }
    }

    // ... (Keep your updateQuestion and createBtn functions exactly as they were) ...
    function updateQuestion() {
        if(!active || isFrozen) return;
        const item = houseData[Math.floor(Math.random() * houseData.length)];
        const isSpelling = timeLeft < 25;
        const display = document.getElementById('display-icon');
        const options = document.getElementById('options-container');
        options.innerHTML = '';
        if(!isSpelling) {
            display.innerText = item.icon;
            display.className = "big-display";
            let pool = [...item.rooms].sort(() => Math.random() - 0.5);
            pool.forEach(r => createBtn(r, item.name));
        } else {
            let word = item.name, idx = Math.floor(Math.random() * word.length);
            if(word[idx] === ' ') idx--;
            let correct = word[idx], hidden = word.split(''); hidden[idx] = '_';
            display.innerText = hidden.join('');
            display.className = "big-display spelling-text";
            let pool = [correct];
            while(pool.length < 4) {
                let r = String.fromCharCode(65 + Math.floor(Math.random()*26));
                if(!pool.includes(r)) pool.push(r);
            }
            pool.sort(() => Math.random() - 0.5).forEach(l => createBtn(l, correct));
        }
    }

    function createBtn(text, correct) {
        const b = document.createElement('button');
        b.className = 'btn-choice';
        b.innerText = text;
        b.onclick = () => {
            if(isFrozen) return;
            if(text === correct) {
                score++;
                document.getElementById('score-val').innerText = score;
                playNote(800, 0.2);
                updateQuestion();
            } else {
                isFrozen = true;
                playNote(200, 0.5);
                document.getElementById('main-area').classList.add('frozen');
                document.getElementById('freeze-msg').style.display = 'block';
                setTimeout(() => {
                    isFrozen = false;
                    document.getElementById('main-area').classList.remove('frozen');
                    document.getElementById('freeze-msg').style.display = 'none';
                    updateQuestion();
                }, 2000);
            }
        };
        document.getElementById('options-container').appendChild(b);
    }
</script>
